name: jharkhand_civicfix
description: SIH25031 - Jharkhand CivicFix - Real-time Civic Complaint Management System
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  
  # Firebase Core & Auth
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.2
  firebase_messaging: ^15.2.10 # Added ^ for safe minor updates

  # Media & UI
  image_picker: ^1.0.7
  cached_network_image: ^3.3.1
  flutter_image_compress: ^2.1.0
  photo_view: ^0.14.0
  intl: ^0.19.0
  shared_preferences: ^2.3.2

  # Location
  geolocator: ^13.0.1
  geocoding: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  
  # Ensure your assets are registered so your custom logos and icons work!
  assets:
    - assets/
    - assets/images/